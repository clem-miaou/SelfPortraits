  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --bg: #c8c8c8;
      --card-bg: #b8b8b8;
      --text: #7a7a7a;
      --header-bg: #b0b0b0;
      --font: 'Josefin Sans', sans-serif;
    }

    body {
      background-color: var(--bg);
      font-family: var(--font);
      color: var(--text);
      min-height: 100vh;
    }

    /* HEADER */
    header {
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 40px 60px;
    }

    .header-title {
      background-color: var(--header-bg);
      padding: 18px 60px;
      font-size: 3rem;
      font-weight: 300;
      letter-spacing: 0.05em;
      color: var(--text);
    }

    /* GALLERY GRID */
    .gallery {
      padding: 20px 60px 60px;
      display: grid;
      grid-template-columns: repeat(8, 1fr);
      gap: 12px;
    }

    .portrait-thumb {
      background: #d0d0d0;
      aspect-ratio: 3/4;
      overflow: hidden;
      cursor: pointer;
      transition: transform 0.15s ease, box-shadow 0.15s ease;
    }

    .portrait-thumb:hover {
      transform: scale(1.03);
      box-shadow: 0 4px 18px rgba(0,0,0,0.18);
    }

    .portrait-thumb img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
      filter: grayscale(10%);
    }

    /* FOOTER */
    footer {
      background-color: #a8a8a8;
      padding: 60px 80px;
      margin-top: 20px;
    }

    footer a {
      display: block;
      font-size: 1.6rem;
      font-weight: 300;
      color: var(--text);
      text-decoration: none;
      margin-bottom: 24px;
      letter-spacing: 0.02em;
      transition: color 0.2s;
    }

    footer a:hover {
      color: #555;
    }
  </style>
</head>
