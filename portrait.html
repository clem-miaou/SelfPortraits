<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>SelfPortraits — Portrait</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Josefin+Sans:wght@300;400;600&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --bg: #c8c8c8;
      --panel: #b8b8b8;
      --text: #7a7a7a;
      --font: 'Josefin Sans', sans-serif;
    }

    body {
      background-color: var(--bg);
      font-family: var(--font);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* MAIN CONTENT */
    .portrait-view {
      flex: 1;
      display: flex;
      align-items: stretch;
      padding: 50px 60px 30px;
      gap: 40px;
    }

    /* LEFT: image */
    .portrait-img-wrap {
      flex: 0 0 auto;
      width: 38%;
      max-width: 420px;
    }

    .portrait-img-wrap img {
      width: 100%;
      height: auto;
      display: block;
    }

    /* RIGHT: info */
    .portrait-info {
      flex: 1;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    .info-date {
      background-color: var(--panel);
      padding: 18px 24px;
      font-size: 1.8rem;
      font-weight: 600;
      letter-spacing: 0.05em;
      color: var(--text);
    }

    .info-meta {
      background-color: var(--panel);
      padding: 18px 24px;
      font-size: 1rem;
      font-weight: 300;
      letter-spacing: 0.03em;
      line-height: 1.7;
      color: var(--text);
    }

    .info-desc {
      background-color: var(--panel);
      padding: 22px 24px;
      font-size: 1rem;
      font-weight: 300;
      letter-spacing: 0.02em;
      line-height: 1.75;
      color: var(--text);
      flex: 1;
    }

    /* FOOTER NAV */
    footer {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 0;
      margin-top: auto;
    }

    .nav-btn {
      flex: 1;
      background-color: #b0b0b0;
      color: var(--text);
      font-family: var(--font);
      font-size: 1rem;
      font-weight: 300;
      letter-spacing: 0.05em;
      padding: 22px 30px;
      border: none;
      cursor: pointer;
      text-align: center;
      transition: background-color 0.2s;
      text-decoration: none;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }

    .nav-btn:hover {
      background-color: #a0a0a0;
      color: #555;
    }

    .nav-btn.center {
      border-left: 2px solid var(--bg);
      border-right: 2px solid var(--bg);
    }

    .nav-btn.hidden {
      visibility: hidden;
      pointer-events: none;
    }
  </style>
</head>
<body>

  <div class="portrait-view">
    <div class="portrait-img-wrap">
      <img id="portrait-img" src="" alt="self portrait" />
    </div>
    <div class="portrait-info">
      <div class="info-date" id="info-date"></div>
      <div class="info-meta" id="info-meta"></div>
      <div class="info-desc" id="info-desc"></div>
    </div>
  </div>

  <footer>
    <button class="nav-btn" id="btn-prev" onclick="navigate(-1)">← previous portrait</button>
    <a class="nav-btn center" href="index.html">back to home</a>
    <button class="nav-btn" id="btn-next" onclick="navigate(1)">next portrait →</button>
  </footer>

  <script>
    const portraits = JSON.parse(sessionStorage.getItem('portraits') || '[]');
    let currentIndex = parseInt(sessionStorage.getItem('currentIndex') || '0');

    function render() {
      const p = portraits[currentIndex];
      if (!p) return;

      document.getElementById('portrait-img').src = `portraits/${p.n}.jpg`;
      document.getElementById('portrait-img').alt = `${p.date} — ${p.keyword}`;
      document.getElementById('info-date').textContent = p.date;
      document.getElementById('info-meta').textContent =
        `${p.keyword}, ${p.time}, ${p.duration}, ${p.ref}, ${p.day}`;
      document.getElementById('info-desc').textContent = p.desc;

      // Show/hide prev/next buttons
      document.getElementById('btn-prev').classList.toggle('hidden', currentIndex === 0);
      document.getElementById('btn-next').classList.toggle('hidden', currentIndex === portraits.length - 1);

      document.title = `SelfPortraits — ${p.date} ${p.keyword}`;
    }

    function navigate(dir) {
      const newIndex = currentIndex + dir;
      if (newIndex >= 0 && newIndex < portraits.length) {
        currentIndex = newIndex;
        sessionStorage.setItem('currentIndex', currentIndex);
        render();
        window.scrollTo(0, 0);
      }
    }

    render();
  </script>
</body>
</html>
